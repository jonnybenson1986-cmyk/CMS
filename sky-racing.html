<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKY Racing Live</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .video-panel {
            position: relative;
            flex: 1;
            min-height: 0;
        }

        .video-panel video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        .channel-label {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 4px 12px;
            border-radius: 4px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
        }

        .divider {
            height: 2px;
            background: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="video-panel">
            <span class="channel-label">SKY 1</span>
            <video id="sky1" autoplay muted playsinline></video>
        </div>
        <div class="divider"></div>
        <div class="video-panel">
            <span class="channel-label">SKY 2</span>
            <video id="sky2" autoplay muted playsinline></video>
        </div>
    </div>

    <script>
        const streams = [
            { id: 'sky1', url: 'https://skylivetab-new.akamaized.net/hls/live/2038780/sky1/index.m3u8' },
            { id: 'sky2', url: 'https://skylivetab-new.akamaized.net/hls/live/2038781/sky2/index.m3u8' }
        ];

        streams.forEach(({ id, url }) => {
            const video = document.getElementById(id);

            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', () => video.play());
            }

            video.addEventListener('click', () => {
                video.muted = !video.muted;
            });
        });
    </script>
</body>
</html>
